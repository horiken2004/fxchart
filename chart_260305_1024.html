<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Trade Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--panel:#131720;--bdr:#1e2535;
  --acc:#00e5ff;--grn:#00e676;--red:#ff1744;--yel:#ffd600;
  --txt:#b0bec5;--mut:#455a64;--up:#26a69a;--dn:#ef5350;
  --cbb:#789abc;--cema:#ffd600;--crsi:#ce93d8;--catr:#ffb74d;--cslope:#80cbc4;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  color:var(--txt);font-family:'Azeret Mono',monospace;font-size:12px;}
#app{display:flex;flex-direction:column;height:100vh;}

#topbar{display:flex;align-items:center;gap:16px;padding:7px 14px;
  background:var(--panel);border-bottom:1px solid var(--bdr);flex-shrink:0;}
#topbar h1{font-size:11px;letter-spacing:.2em;color:var(--acc);white-space:nowrap;}
#logname{font-size:10px;color:var(--mut);}
#kpis{display:flex;gap:20px;margin-left:auto;}
.kpi{text-align:center;}
.kpi-l{font-size:8px;letter-spacing:.12em;color:var(--mut);text-transform:uppercase;}
.kpi-v{font-size:13px;font-weight:600;}
.g{color:var(--grn);}.r{color:var(--red);}.y{color:var(--yel);}.a{color:var(--acc);}

#main{flex:1;display:flex;flex-direction:column;min-height:0;}

#chart{position:relative;overflow:hidden;cursor:crosshair;flex-shrink:0;}
canvas{position:absolute;top:0;left:0;}

.subchart{position:relative;overflow:hidden;flex-shrink:0;border-top:1px solid var(--bdr);}
.subchart canvas{position:absolute;top:0;left:0;}
.sub-label{position:absolute;top:4px;left:8px;font-size:9px;
  letter-spacing:.1em;pointer-events:none;z-index:2;opacity:.75;}
#subs{display:flex;flex-direction:column;}

#bottombar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;
  padding:6px 12px;background:var(--panel);border-top:1px solid var(--bdr);flex-shrink:0;}
.sep{width:1px;height:16px;background:var(--bdr);margin:0 3px;}
.grp-label{font-size:9px;letter-spacing:.1em;color:var(--mut);text-transform:uppercase;white-space:nowrap;}
.btn{padding:3px 10px;font-size:10px;font-family:'Azeret Mono',monospace;
  background:transparent;border:1px solid var(--bdr);color:var(--txt);
  cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--acc);color:var(--acc);}
.btn.on{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600;}
#bBB.on    {background:var(--cbb);   color:#fff;border-color:var(--cbb);}
#bEMA.on   {background:var(--cema);  color:#000;border-color:var(--cema);}
#bRSI.on   {background:var(--crsi);  color:#000;border-color:var(--crsi);}
#bATR.on   {background:var(--catr);  color:#000;border-color:var(--catr);}
#bSlope.on {background:var(--cslope);color:#000;border-color:var(--cslope);}
select{padding:3px 6px;font-size:10px;font-family:'Azeret Mono',monospace;
  background:var(--bg);border:1px solid var(--bdr);color:var(--txt);cursor:pointer;}
#hint{margin-left:auto;font-size:9px;color:var(--mut);}

#legend{position:absolute;bottom:10px;left:10px;
  background:rgba(13,15,20,.9);border:1px solid var(--bdr);
  padding:7px 11px;font-size:10px;line-height:2;pointer-events:none;z-index:5;}
.li{display:flex;align-items:center;gap:7px;}
.ll{width:16px;height:2px;flex-shrink:0;}
.ld{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

#tip{position:absolute;display:none;background:rgba(13,15,20,.96);
  border:1px solid var(--bdr);padding:9px 13px;font-size:11px;
  line-height:1.9;min-width:210px;pointer-events:none;z-index:10;}
#tip .ttl{font-size:9px;letter-spacing:.12em;color:var(--acc);margin-bottom:3px;}

#ohlc{position:absolute;top:5px;left:50%;transform:translateX(-50%);
  display:none;background:rgba(13,15,20,.82);border:1px solid var(--bdr);
  padding:2px 10px;font-size:10px;white-space:nowrap;pointer-events:none;z-index:5;}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <h1>◈ TRADE VISUALIZER</h1>
    <span id="logname">trade_analysis_v300.csv</span>
    <div id="kpis"></div>
  </div>

  <div id="main">
    <div id="chart">
      <canvas id="cvB"></canvas>
      <canvas id="cvO"></canvas>
      <canvas id="cvC"></canvas>
      <div id="legend">
        <div class="li"><div class="ll" style="background:var(--up)"></div>陽線</div>
        <div class="li"><div class="ll" style="background:var(--dn)"></div>陰線</div>
        <div class="li" id="leg-bb"><div class="ll" style="background:var(--cbb);border-top:1px dashed"></div>BB ±2σ (18期間)</div>
        <div class="li" id="leg-ema"><div class="ll" style="background:var(--cema)"></div>EMA 200</div>
        <div class="li"><div class="ld" style="background:var(--acc)"></div>LONG エントリー</div>
        <div class="li"><div class="ld" style="background:#ff6d00"></div>SHORT エントリー</div>
        <div class="li"><div class="ll" style="background:var(--grn)"></div>勝ちトレード</div>
        <div class="li"><div class="ll" style="background:var(--red)"></div>負けトレード</div>
      </div>
      <div id="ohlc"></div>
      <div id="tip"></div>
    </div>
    <div id="subs"></div>
  </div>

  <div id="bottombar">
    <span class="grp-label">主チャート</span>
    <button class="btn" id="bBB"     onclick="tog('bb')">BB ±2σ</button>
    <button class="btn on" id="bEMA" onclick="tog('ema')">EMA 200</button>
    <button class="btn on" id="bTrades" onclick="tog('trades')">TRADES</button>
    <div class="sep"></div>
    <span class="grp-label">サブチャート</span>
    <button class="btn" id="bRSI"   onclick="tog('rsi')">RSI 14</button>
    <button class="btn" id="bATR"   onclick="tog('atr')">ATR 14</button>
    <button class="btn" id="bSlope" onclick="tog('slope')">EMA SLOPE</button>
    <div class="sep"></div>
    <span class="grp-label">フィルタ</span>
    <button class="btn on" id="bAll"  onclick="filt('all')">ALL</button>
    <button class="btn"    id="bWin"  onclick="filt('win')">✓ WIN</button>
    <button class="btn"    id="bLoss" onclick="filt('loss')">✗ LOSS</button>
    <div class="sep"></div>
    <span class="grp-label">日付</span>
    <select id="dateSel" onchange="jumpDate()"><option value="">— 全期間 —</option></select>
    <div class="sep"></div>
    <button class="btn" onclick="resetView()">⟳ RESET</button>
    <span id="hint">ホイール:ズーム &nbsp;|&nbsp; ドラッグ:パン &nbsp;|&nbsp; ホバー:詳細</span>
  </div>

</div>

const S = {
  vs:0, vc:CD.length, cw:0,
  layers:{bb:false, ema:true, trades:true, rsi:false, atr:false, slope:false},
  filt:'all', drag:false, dx:0, dvs:0, mx:-1, my:-1,
};

const mainChart = document.getElementById('chart');
const cvB=document.getElementById('cvB'), ctxB=cvB.getContext('2d');
const cvO=document.getElementById('cvO'), ctxO=cvO.getContext('2d');
const cvC=document.getElementById('cvC'), ctxC=cvC.getContext('2d');

const SUB_H = 90;
const subCtx = {};

// ----- 日付セレクト -----
(function(){
  const dates=[...new Set(CD.map(c=>c.t.slice(0,10)))];

// ----- KPI -----

  const wins=TD.filter(t=>t.pips>0),loss=TD.filter(t=>t.pips<=0),n=TD.length;

  const tot=TD.reduce((s,t)=>s+t.pips,0).toFixed(3);
  const pf=loss.length>0?(wins.reduce((s,t)=>s+t.pips,0)/Math.abs(loss.reduce((s,t)=>s+t.pips,0))).toFixed(2):'∞';

// ----- ヘルパー -----
const PAD={t:30,b:22,l:8,r:72};
const SPAD={t:8,b:14,l:8,r:72};

function visC(){ return CD.slice(S.vs,Math.min(S.vs+S.vc,CD.length)); }
function filtT(){ return TD.filter(t=>S.filt==='win'?t.pips>0:S.filt==='loss'?t.pips<=0:true); }
function subKeys(){ return ['rsi','atr','slope'].filter(k=>S.layers[k]); }

function mainScale(ca){
  let lo=Infinity,hi=-Infinity;
  ca.forEach(c=>{
    lo=Math.min(lo,c.l); hi=Math.max(hi,c.h);
    if(S.layers.bb){ if(c.bu!=null)hi=Math.max(hi,c.bu); if(c.bl!=null)lo=Math.min(lo,c.bl); }
  });
  const p=(hi-lo)*0.05; return {lo:lo-p,hi:hi+p};
}
function py(v,lo,hi,h,pt,pb){ return pt+(hi-v)/(hi-lo)*(h-pt-pb); }
function px(i,n,w){ S.cw=(w-PAD.l-PAD.r)/n; return PAD.l+(i+.5)*S.cw; }
function tidx(ts){ return CD.findIndex(c=>c.t===ts); }

// ----- サブチャート構築 -----
function rebuildSubs(){
  const subsEl=document.getElementById('subs');
  subsEl.innerHTML=''; Object.keys(subCtx).forEach(k=>delete subCtx[k]);
  const keys=subKeys();
  const colors={rsi:'var(--crsi)',atr:'var(--catr)',slope:'var(--cslope)'};
  const names ={rsi:'RSI 14',atr:'ATR 14',slope:'EMA SLOPE (×10⁻⁴)'};
  keys.forEach(k=>{
    const div=document.createElement('div');
    div.className='subchart'; div.id='sub_'+k; div.style.height=SUB_H+'px';
    const lbl=document.createElement('div');
    lbl.className='sub-label'; lbl.style.color=colors[k]; lbl.textContent=names[k];
    div.appendChild(lbl);
    const cv=document.createElement('canvas'); cv.id='cvSub_'+k;
    div.appendChild(cv); subsEl.appendChild(div);
    subCtx[k]={cv,ctx:cv.getContext('2d')};
  });
  resizeAll();
}

// ----- リサイズ -----
function resizeAll(){
  const w=mainChart.parentElement.clientWidth;
  const totalH=mainChart.parentElement.clientHeight;
  const mainH=Math.max(100, totalH - subKeys().length*SUB_H);
  mainChart.style.height=mainH+'px';
  [cvB,cvO,cvC].forEach(c=>{c.width=w;c.height=mainH;});
  Object.values(subCtx).forEach(s=>{s.cv.width=w;s.cv.height=SUB_H;});
  drawAll();
}
window.addEventListener('resize',resizeAll);

// ----- メインチャート描画 -----
function drawBase(){
  const w=cvB.width,h=cvB.height;
  ctxB.clearRect(0,0,w,h);
  const ca=visC(); if(!ca.length)return;
  const {lo,hi}=mainScale(ca),n=ca.length;

  // グリッド
  ctxB.strokeStyle='rgba(30,37,53,.7)'; ctxB.lineWidth=1;
  ctxB.fillStyle='rgba(176,190,197,.4)'; ctxB.font='9px Azeret Mono'; ctxB.textAlign='left';
  for(let i=0;i<=6;i++){
    const pr=lo+(hi-lo)*i/6,y=py(pr,lo,hi,h,PAD.t,PAD.b);
    ctxB.beginPath();ctxB.moveTo(PAD.l,y);ctxB.lineTo(w-PAD.r,y);ctxB.stroke();
    ctxB.fillText(pr.toFixed(3),w-PAD.r+4,y+3);
  }

  // BB
  if(S.layers.bb){
    // 帯塗り
    ctxB.beginPath(); let fi=true;
    ca.forEach((c,i)=>{if(c.bu==null)return;const x=px(i,n,w),y=py(c.bu,lo,hi,h,PAD.t,PAD.b);fi?ctxB.moveTo(x,y):ctxB.lineTo(x,y);fi=false;});
    for(let i=ca.length-1;i>=0;i--){const c=ca[i];if(c.bl==null)continue;ctxB.lineTo(px(i,n,w),py(c.bl,lo,hi,h,PAD.t,PAD.b));}
    ctxB.closePath(); ctxB.fillStyle='rgba(120,144,156,.07)'; ctxB.fill();
    // 上下線
    ['bu','bl'].forEach(k=>{
      ctxB.beginPath();let ff=true;
      ca.forEach((c,i)=>{if(c[k]==null)return;const x=px(i,n,w),y=py(c[k],lo,hi,h,PAD.t,PAD.b);ff?ctxB.moveTo(x,y):ctxB.lineTo(x,y);ff=false;});
      ctxB.strokeStyle='rgba(120,144,156,.6)';ctxB.lineWidth=1;ctxB.setLineDash([3,3]);ctxB.stroke();ctxB.setLineDash([]);
    });
    // 中心線
    ctxB.beginPath();let fm=true;
    ca.forEach((c,i)=>{if(c.bm==null)return;const x=px(i,n,w),y=py(c.bm,lo,hi,h,PAD.t,PAD.b);fm?ctxB.moveTo(x,y):ctxB.lineTo(x,y);fm=false;});
    ctxB.strokeStyle='rgba(120,144,156,.3)';ctxB.lineWidth=1;ctxB.setLineDash([1,3]);ctxB.stroke();ctxB.setLineDash([]);
  }

  // EMA200
  if(S.layers.ema){
    ctxB.beginPath();let fe=true;
    ca.forEach((c,i)=>{if(c.em==null)return;const x=px(i,n,w),y=py(c.em,lo,hi,h,PAD.t,PAD.b);fe?ctxB.moveTo(x,y):ctxB.lineTo(x,y);fe=false;});
    ctxB.strokeStyle='#ffd600';ctxB.lineWidth=1.4;ctxB.setLineDash([]);ctxB.stroke();
  }

  // ローソク足
  const bw=Math.max(S.cw*.65,1);
  ca.forEach((c,i)=>{
    const x=px(i,n,w);
    const yO=py(c.o,lo,hi,h,PAD.t,PAD.b),yC=py(c.c,lo,hi,h,PAD.t,PAD.b);
    const yH=py(c.h,lo,hi,h,PAD.t,PAD.b),yL=py(c.l,lo,hi,h,PAD.t,PAD.b);
    const bull=c.c>=c.o,col=bull?'#26a69a':'#ef5350';
    ctxB.strokeStyle=col;ctxB.lineWidth=1;
    ctxB.beginPath();ctxB.moveTo(x,yH);ctxB.lineTo(x,yL);ctxB.stroke();
    ctxB.fillStyle=col;ctxB.fillRect(x-bw/2,Math.min(yO,yC),bw,Math.max(Math.abs(yC-yO),1));
  });

  // X軸ラベル
  ctxB.fillStyle='rgba(176,190,197,.4)';ctxB.font='9px Azeret Mono';ctxB.textAlign='center';
  const step=Math.max(1,Math.floor(n/8));
  ca.forEach((c,i)=>{if(i%step!==0)return;ctxB.fillText(c.t.slice(5,16).replace('T',' '),px(i,n,w),h-6);});
}

// ----- トレードオーバーレイ -----
function drawOverlay(){
  const w=cvO.width,h=cvO.height;
  ctxO.clearRect(0,0,w,h);
  if(!S.layers.trades)return;
  const ca=visC();if(!ca.length)return;
  const {lo,hi}=mainScale(ca),n=ca.length;
  const vsT=CD[S.vs].t,veT=CD[Math.min(S.vs+S.vc-1,CD.length-1)].t;

  filtT().forEach(t=>{
    if(t.entry_time>veT&&t.exit_time<vsT)return;
    const ei=tidx(t.entry_time)-S.vs,xi=tidx(t.exit_time)-S.vs;
    if(ei<-(n*.5)&&xi<0)return;
    const ei2=Math.max(0,Math.min(ei,n-1)),xi2=Math.max(0,Math.min(xi,n-1));
    const ex=px(ei2,n,w),xx=px(xi2,n,w);
    const ey=py(t.entry_px,lo,hi,h,PAD.t,PAD.b),xy=py(t.exit_px,lo,hi,h,PAD.t,PAD.b);
    const win=t.pips>0;
    const lc=win?'rgba(0,230,118,.85)':'rgba(255,23,68,.85)';
    const ec=t.direction.includes('LONG')?'#00e5ff':'#ff6d00';
    ctxO.beginPath();ctxO.moveTo(ex,ey);ctxO.lineTo(xx,xy);
    ctxO.strokeStyle=lc;ctxO.lineWidth=1.8;ctxO.setLineDash([]);ctxO.stroke();
    ctxO.beginPath();ctxO.arc(ex,ey,4.5,0,Math.PI*2);
    ctxO.fillStyle=ec;ctxO.fill();
    ctxO.strokeStyle='#0d0f14';ctxO.lineWidth=1.2;ctxO.stroke();
    ctxO.fillStyle=lc;ctxO.fillRect(xx-3,xy-3,6,6);
    if(S.vc<=600){
      ctxO.font='bold 9px Azeret Mono';ctxO.fillStyle=ec;ctxO.textAlign='center';
      ctxO.fillText(t.direction.includes('LONG')?'L':'S',ex,ey+(t.direction.includes('LONG')?-10:12));
    }
  });
}

// ----- サブチャート描画 -----
function drawSub(k){
  const sc=subCtx[k];if(!sc)return;
  const {cv,ctx}=sc;
  const w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  const ca=visC();if(!ca.length)return;
  const n=ca.length;
  const dkey={rsi:'rs',atr:'at',slope:'es'}[k];
  const color={rsi:'#ce93d8',atr:'#ffb74d',slope:'#80cbc4'}[k];

  // スケール
  let lo,hi;
  if(k==='rsi'){lo=0;hi=100;}
  else{
    const vals=ca.map(c=>c[dkey]).filter(v=>v!=null);
    if(!vals.length)return;
    const mn=Math.min(...vals),mx=Math.max(...vals);
    const pad=(mx-mn)*0.12;lo=mn-pad;hi=mx+pad;
  }

  // グリッド
  ctx.strokeStyle='rgba(30,37,53,.7)';ctx.lineWidth=1;
  ctx.fillStyle='rgba(176,190,197,.35)';ctx.font='8px Azeret Mono';ctx.textAlign='left';
  const gridVals=k==='rsi'?[30,42,62,70]:
                 k==='atr'?[lo+(hi-lo)*.25,lo+(hi-lo)*.5,lo+(hi-lo)*.75]:
                           [lo+(hi-lo)*.25,0,lo+(hi-lo)*.75];
  gridVals.forEach(v=>{
    if(v<lo||v>hi)return;
    const y=py(v,lo,hi,h,SPAD.t,SPAD.b);
    ctx.beginPath();ctx.moveTo(SPAD.l,y);ctx.lineTo(w-SPAD.r,y);ctx.stroke();
    const lbl=k==='rsi'?v.toFixed(0):k==='atr'?v.toFixed(4):(v*10000).toFixed(1)+'e-4';
    ctx.fillText(lbl,w-SPAD.r+3,y+3);
  });

  // RSIゾーン
  if(k==='rsi'){
    const y70=py(70,lo,hi,h,SPAD.t,SPAD.b),y30=py(30,lo,hi,h,SPAD.t,SPAD.b);
    ctx.fillStyle='rgba(255,23,68,.06)';ctx.fillRect(SPAD.l,SPAD.t,w-SPAD.l-SPAD.r,y70-SPAD.t);
    ctx.fillStyle='rgba(0,230,118,.06)';ctx.fillRect(SPAD.l,y30,w-SPAD.l-SPAD.r,h-SPAD.b-y30);
    // エントリー閾値線 42/62
    [[42,'rgba(0,230,118,.5)'],[62,'rgba(255,23,68,.5)']].forEach(([v,c])=>{
      if(v<lo||v>hi)return;
      const y=py(v,lo,hi,h,SPAD.t,SPAD.b);
      ctx.strokeStyle=c;ctx.lineWidth=1;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(SPAD.l,y);ctx.lineTo(w-SPAD.r,y);ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  // EMAスロープ ゼロライン + 閾値
  if(k==='slope'){
    if(0>=lo&&0<=hi){
      const y0=py(0,lo,hi,h,SPAD.t,SPAD.b);
      ctx.strokeStyle='rgba(176,190,197,.3)';ctx.lineWidth=1;ctx.setLineDash([2,4]);
      ctx.beginPath();ctx.moveTo(SPAD.l,y0);ctx.lineTo(w-SPAD.r,y0);ctx.stroke();ctx.setLineDash([]);
    }
    [[0.0005,'rgba(0,230,118,.5)'],[-0.0005,'rgba(255,23,68,.5)']].forEach(([v,c])=>{
      if(v<lo||v>hi)return;
      const y=py(v,lo,hi,h,SPAD.t,SPAD.b);
      ctx.strokeStyle=c;ctx.lineWidth=1;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(SPAD.l,y);ctx.lineTo(w-SPAD.r,y);ctx.stroke();ctx.setLineDash([]);
    });
  }

  // ATR SL_MIN参考線
  if(k==='atr'){
    const slmin=0.060;
    if(slmin>=lo&&slmin<=hi){
      const y=py(slmin,lo,hi,h,SPAD.t,SPAD.b);
      ctx.strokeStyle='rgba(0,230,118,.55)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(SPAD.l,y);ctx.lineTo(w-SPAD.r,y);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(0,230,118,.6)';ctx.font='8px Azeret Mono';ctx.textAlign='right';
      ctx.fillText('SL_MIN=0.060',w-SPAD.r-2,y-2);
    }
  }

  // ライン
  ctx.beginPath();let first=true;
  ca.forEach((c,i)=>{
    const v=c[dkey];if(v==null)return;
    const x=px(i,n,w),y=py(v,lo,hi,h,SPAD.t,SPAD.b);
    first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;
  });
  ctx.strokeStyle=color;ctx.lineWidth=1.3;ctx.setLineDash([]);ctx.stroke();

  // 十字線縦線同期
  if(S.mx>=0){
    ctx.strokeStyle='rgba(176,190,197,.2)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(S.mx,SPAD.t);ctx.lineTo(S.mx,h-SPAD.b);ctx.stroke();ctx.setLineDash([]);
    const ci=Math.max(0,Math.min(Math.floor((S.mx-PAD.l)/S.cw),n-1));
    const cv2=ca[ci];
    if(cv2&&cv2[dkey]!=null){
      const y=py(cv2[dkey],lo,hi,h,SPAD.t,SPAD.b);
      ctx.beginPath();ctx.arc(S.mx,y,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    }
  }
}

// ----- 十字線 -----
function drawCross(){
  const w=cvC.width,h=cvC.height;
  ctxC.clearRect(0,0,w,h);
  if(S.mx<0)return;
  ctxC.strokeStyle='rgba(176,190,197,.22)';ctxC.lineWidth=1;ctxC.setLineDash([4,4]);
  ctxC.beginPath();ctxC.moveTo(S.mx,PAD.t);ctxC.lineTo(S.mx,h-PAD.b);ctxC.stroke();
  ctxC.beginPath();ctxC.moveTo(PAD.l,S.my);ctxC.lineTo(w-PAD.r,S.my);ctxC.stroke();
  ctxC.setLineDash([]);
  const ca=visC();if(!ca.length)return;
  const {lo,hi}=mainScale(ca),n=ca.length;
  const ci=Math.max(0,Math.min(Math.floor((S.mx-PAD.l)/S.cw),n-1));
  const c=ca[ci];
  const price=hi-(S.my-PAD.t)/(h-PAD.t-PAD.b)*(hi-lo);
  const bull=c.c>=c.o;
  const rsiV =c.rs!=null?` <span style="color:var(--crsi)">RSI:${c.rs.toFixed(1)}</span>`:'';
  const atrV =c.at!=null?` <span style="color:var(--catr)">ATR:${c.at.toFixed(4)}</span>`:'';
  const slpV =c.es!=null?` <span style="color:var(--cslope)">SLP:${(c.es*10000).toFixed(2)}e-4</span>`:'';
  const el=document.getElementById('ohlc');
  el.style.display='block';
  el.innerHTML=
    '<span style="color:var(--mut)">'+c.t.replace('T',' ')+'</span> '+
    'O:<b>'+c.o+'</b> H:<b style="color:var(--grn)">'+c.h+'</b> '+
    'L:<b style="color:var(--red)">'+c.l+'</b> '+
    'C:<b style="color:'+(bull?'#26a69a':'#ef5350')+'">'+c.c+'</b> '+
    '<span style="color:var(--acc)"> '+price.toFixed(3)+'</span>'+
    rsiV+atrV+slpV;
  subKeys().forEach(k=>drawSub(k));
}

function drawAll(){drawBase();drawOverlay();drawCross();subKeys().forEach(k=>drawSub(k));}

// ----- トレードホバー -----
function checkHover(mx,my){
  const ca=visC();if(!ca.length||!S.layers.trades)return;
  const {lo,hi}=mainScale(ca),n=ca.length,w=cvC.width,h=cvC.height;
  const tip=document.getElementById('tip');
  let found=null;
  for(const t of filtT()){
    const ei=tidx(t.entry_time)-S.vs,xi=tidx(t.exit_time)-S.vs;
    const ei2=Math.max(0,Math.min(ei,n-1)),xi2=Math.max(0,Math.min(xi,n-1));
    const ex=px(ei2,n,w),ey=py(t.entry_px,lo,hi,h,PAD.t,PAD.b);
    const xx=px(xi2,n,w),xy=py(t.exit_px,lo,hi,h,PAD.t,PAD.b);
    if(Math.hypot(mx-ex,my-ey)<12||Math.hypot(mx-xx,my-xy)<12){found=t;break;}
  }
  if(found){
    const win=found.pips>0;
    const sl=found.sl!=null?'<br>SL幅: '+found.sl.toFixed(4):'';
    const ei=tidx(found.entry_time);
    const ec=ei>=0?CD[ei]:null;
    const ind=ec?
      '<br><span style="color:var(--crsi)">RSI: '+(ec.rs!=null?ec.rs.toFixed(1):'---')+'</span>'+
      '&nbsp;<span style="color:var(--catr)">ATR: '+(ec.at!=null?ec.at.toFixed(4):'---')+'</span>'+
      '&nbsp;<span style="color:var(--cslope)">SLP: '+(ec.es!=null?(ec.es*10000).toFixed(2)+'e-4':'---')+'</span>':'';
    tip.innerHTML=
      '<div class="ttl">'+found.direction+' — '+(win?'✓ WIN':'✗ LOSS')+'</div>'+
      'エントリー: '+found.entry_time+'<br>決済: '+found.exit_time+'<br>'+
      'エントリー価格: '+found.entry_px.toFixed(3)+'<br>決済価格: '+found.exit_px.toFixed(3)+'<br>'+
      '損益: <span style="color:'+(win?'var(--grn)':'var(--red)')+'">'+(win?'+':'')+found.pips.toFixed(3)+' pips</span>'+sl+ind;
    tip.style.display='block';
    let tx=mx+16,ty=my-70;
    if(tx+230>w)tx-=250;if(ty<0)ty=10;
    tip.style.left=tx+'px';tip.style.top=ty+'px';
  }else{tip.style.display='none';}
}

// ----- イベント -----
cvC.addEventListener('mousemove',e=>{
  const r=cvC.getBoundingClientRect();
  S.mx=e.clientX-r.left;S.my=e.clientY-r.top;
  drawCross();checkHover(S.mx,S.my);
  if(S.drag){
    const shift=Math.round(-(e.clientX-S.dx)/(S.cw||6));
    S.vs=Math.max(0,Math.min(CD.length-S.vc,S.dvs+shift));drawAll();
  }
});
cvC.addEventListener('mouseleave',()=>{
  S.mx=-1;S.my=-1;
  document.getElementById('tip').style.display='none';
  document.getElementById('ohlc').style.display='none';
  ctxC.clearRect(0,0,cvC.width,cvC.height);
  subKeys().forEach(k=>drawSub(k));
});
cvC.addEventListener('mousedown',e=>{S.drag=true;S.dx=e.clientX;S.dvs=S.vs;});
window.addEventListener('mouseup',()=>{S.drag=false;});
cvC.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?1.15:.87;
  S.vc=Math.max(30,Math.min(CD.length,Math.round(S.vc*f)));
  S.vs=Math.max(0,Math.min(CD.length-S.vc,S.vs));drawAll();
},{passive:false});

// ----- ボタン -----
function tog(k){
  S.layers[k]=!S.layers[k];
  const ids={bb:'bBB',ema:'bEMA',trades:'bTrades',rsi:'bRSI',atr:'bATR',slope:'bSlope'};
  document.getElementById(ids[k]).classList.toggle('on',S.layers[k]);
  if(k==='bb'){const el=document.getElementById('leg-bb');if(el)el.style.display=S.layers[k]?'flex':'none';}
  if(k==='ema'){const el=document.getElementById('leg-ema');if(el)el.style.display=S.layers[k]?'flex':'none';}
  if(['rsi','atr','slope'].includes(k)){rebuildSubs();}else{drawAll();}
}
function filt(f){
  S.filt=f;
  ['bAll','bWin','bLoss'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById(f==='all'?'bAll':f==='win'?'bWin':'bLoss').classList.add('on');
  drawOverlay();
}
function jumpDate(){
  const d=document.getElementById('dateSel').value;if(!d)return;
  const i=CD.findIndex(c=>c.t.startsWith(d));
  if(i>=0){S.vs=Math.max(0,i);S.vc=480;drawAll();}
}
function resetView(){S.vs=0;S.vc=CD.length;document.getElementById('dateSel').value='';drawAll();}

// ----- 初期化 -----
document.getElementById('leg-bb').style.display='none';
rebuildSubs();
</script>
